name: tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore content sources
        env:
          # Необязательно: задайте, если перейдёте на режим паролей (OPEN_ACCESS=false).
          # В открытом режиме не нужно — ключ берётся из index.html.
          SECRETS_JSON: ${{ secrets.SECRETS_JSON }}
        run: |
          node tests/restore-src.mjs
          node build.mjs decrypt

      - name: Run tests
        run: npm test
