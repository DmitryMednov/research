<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KH Build — История изменений</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  (function(){
    try {
      var t = localStorage.getItem('kh-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) { document.documentElement.setAttribute('data-theme', 'light'); }
  })();
</script>
<style>
:root {
  --bg:#FFFFFF; --card:#FFFFFF; --surface2:#F5F3EE; --border:#E0DDD3;
  --text:#1A1A1A; --muted:#6B6A65; --accent:#C9A65D;
  --dark-section:#1A1A1A; --on-dark:#F5F3EE;
  --danger:#C0392B;
  --shadow:0 2px 8px rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg:#141414; --card:#1F1F1F; --surface2:#292826; --border:#38342A;
  --text:#F5F3EE; --muted:#9A938A; --accent:#C9A65D;
  --dark-section:#0B0B0B;
  --danger:#ef4444;
  --shadow:0 2px 8px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.container { max-width:900px; margin:0 auto; padding:24px; }
.theme-toggle { position:fixed; top:18px; right:18px; z-index:1000; width:42px; height:42px; border-radius:50%;
  border:2px solid var(--accent); background:var(--dark-section); color:var(--accent); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.25); }
.theme-toggle:hover { transform:scale(1.1); background:var(--accent); color:var(--dark-section); }
[data-theme="dark"] .theme-toggle__light { display:none; }
[data-theme="light"] .theme-toggle__dark,:root:not([data-theme="dark"]) .theme-toggle__dark { display:none; }
.header { text-align:center; padding:56px 24px 40px; margin:-24px -24px 40px;
  background:var(--dark-section); color:var(--on-dark); border-bottom:3px solid var(--accent); }
.header h1 { font-size:30px; font-weight:700; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
.header .subtitle { color:#B8B5AA; font-size:14px; margin-bottom:14px; }
.header .logo { font-size:24px; letter-spacing:6px; color:var(--accent); margin-bottom:18px; font-weight:800; }
.header .back { display:inline-block; color:var(--accent); text-decoration:none; font-size:12px; border:1px solid var(--accent); padding:6px 14px; border-radius:4px; }
.header .back:hover { background:var(--accent); color:var(--dark-section); }
.summary { display:flex; justify-content:center; gap:40px; margin-bottom:32px; flex-wrap:wrap; }
.sum-item { text-align:center; }
.sum-item .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:600; margin-bottom:4px; }
.sum-item .value { font-size:32px; font-weight:700; color:var(--accent); }
.sum-item .value.text { font-size:16px; color:var(--text); }
.commit-list { background:var(--card); border:1px solid var(--border); border-radius:4px; box-shadow:var(--shadow); overflow:hidden; }
.commit { padding:16px 22px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:100px 1fr; gap:16px; align-items:start; font-size:14px; }
.commit:last-child { border-bottom:none; }
.commit:hover { background:var(--surface2); }
.commit .date { font-size:12px; color:var(--muted); font-weight:700; letter-spacing:0.4px; white-space:nowrap; }
.commit .msg { line-height:1.5; }
.commit .msg .author { font-size:11px; color:var(--muted); margin-top:4px; }
.loading { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
.error-box { background:rgba(192,57,43,0.1); border:1px solid var(--danger); color:var(--danger); border-radius:4px; padding:16px 20px; margin-bottom:20px; font-size:13px; line-height:1.6; }
.footer { text-align:center; padding:32px 24px; margin:48px -24px -24px; color:var(--on-dark); font-size:12px; background:var(--dark-section); border-top:3px solid var(--accent); }
.footer a { color:var(--accent); text-decoration:none; }
.footer a:hover { text-decoration:underline; }
@media (max-width:600px) {
  .container { padding:14px; }
  .header { padding:32px 16px 24px; margin:-14px -14px 24px; }
  .header h1 { font-size:20px; }
  .commit { grid-template-columns:80px 1fr; gap:10px; padding:12px 14px; font-size:13px; }
  .summary { gap:20px; }
  .sum-item .value { font-size:24px; }
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><span class="theme-toggle__light">🌙</span><span class="theme-toggle__dark">☀</span></button>
<div class="container">

<div class="header">
  <div class="logo">KH BUILD</div>
  <h1>История изменений</h1>
  <div class="subtitle">Полный список обновлений сайта</div>
  <a class="back" href="index.html">← Назад на главную</a>
</div>

<div class="summary">
  <div class="sum-item">
    <div class="label">Всего изменений</div>
    <div class="value" id="total-commits">—</div>
  </div>
  <div class="sum-item">
    <div class="label">Последнее</div>
    <div class="value text" id="latest-date">—</div>
  </div>
  <div class="sum-item">
    <div class="label">Первое</div>
    <div class="value text" id="first-date">—</div>
  </div>
</div>

<div id="error" style="display:none;"></div>
<div id="commits"><div class="loading">Загружаю историю…</div></div>

<div class="footer">
  KH Build LLC · История изменений
</div>

</div>

<script>
function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('kh-theme', next); } catch(e) {}
}

var REPO = 'DmitryMednov/KHBuild';
var AUTHOR = 'Dmitry Mednov';

function fmtDate(iso) {
  var d = new Date(iso);
  var m = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
  return d.getDate() + ' ' + m + ' ' + d.getFullYear();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; });
}

function cleanMsg(msg) {
  return (msg || '').split('\n')[0]
    .replace(/\s*https:\/\/claude\.ai\/code\/\S+/gi, '')
    .replace(/\s*Co-Authored-By:.*$/gi, '')
    .replace(/\s*\([Cc]laude\)/g, '')
    .trim();
}

function renderList(commits) {
  var box = document.getElementById('commits');
  if (!commits.length) { box.innerHTML = '<div class="loading">Пока нет изменений.</div>'; return; }
  var html = '<div class="commit-list">';
  commits.forEach(function(c) {
    var iso = c.commit.committer.date;
    var msg = cleanMsg(c.commit.message);
    html += '<div class="commit">';
    html += '<div class="date">' + fmtDate(iso) + '</div>';
    html += '<div class="msg">' + escapeHtml(msg);
    html += '<div class="author">' + AUTHOR + '</div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
}

function updateSummary(commits) {
  document.getElementById('total-commits').textContent = commits.length;
  if (commits.length) {
    document.getElementById('latest-date').textContent = fmtDate(commits[0].commit.committer.date);
    document.getElementById('first-date').textContent = fmtDate(commits[commits.length - 1].commit.committer.date);
  }
}

function loadAll() {
  var branches = ['claude/debug-khbuild-errors-fFMSX', 'main'];
  var all = [];
  var seen = {};
  var pending = branches.length;

  branches.forEach(function(br){
    fetch('https://api.github.com/repos/' + REPO + '/commits?sha=' + encodeURIComponent(br) + '&per_page=100')
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(data){
        if (Array.isArray(data)) {
          data.forEach(function(c){
            if (!seen[c.sha]) { seen[c.sha] = 1; all.push(c); }
          });
        }
      })
      .catch(function(){})
      .finally(function(){
        pending--;
        if (pending === 0) {
          all.sort(function(a,b){ return new Date(b.commit.committer.date) - new Date(a.commit.committer.date); });
          if (all.length === 0) {
            document.getElementById('commits').innerHTML = '<div class="error-box">Не удалось загрузить историю. Попробуйте обновить страницу позже.</div>';
            document.getElementById('total-commits').textContent = '?';
            return;
          }
          updateSummary(all);
          renderList(all);
        }
      });
  });
}

loadAll();
</script>
<script src="footer.js" defer></script>
</body>
</html>
